apiVersion: gh-infra/v1
kind: Repository
metadata:
  name: kanban
  owner: shuntaka9576
spec:
  description: ":octocat: Simple terminal UI for GitHub Project"
  visibility: public
  archived: false
  labels:
  - name: bug
    description: Something isn't working
    color: d73a4a
  - name: documentation
    description: Improvements or additions to documentation
    color: 0075ca
  - name: duplicate
    description: This issue or pull request already exists
    color: cfd3d7
  - name: enhancement
    description: New feature or request
    color: a2eeef
  - name: good first issue
    description: Good for newcomers
    color: 7057ff
  - name: help wanted
    description: Extra attention is needed
    color: 008672
  - name: invalid
    description: This doesn't seem right
    color: e4e669
  - name: question
    description: Further information is requested
    color: d876e3
  - name: tagpr
    color: ededed
  - name: wontfix
    description: This will not be worked on
    color: ffffff
  features:
    issues: true
    projects: true
    wiki: true
    discussions: false
    pull_requests: true
  merge_strategy:
    allow_merge_commit: true
    allow_squash_merge: true
    allow_rebase_merge: true
    allow_auto_merge: false
    auto_delete_head_branches: false
    squash_merge_commit_title: COMMIT_OR_PR_TITLE
    squash_merge_commit_message: COMMIT_MESSAGES
    merge_commit_title: MERGE_MESSAGE
    merge_commit_message: PR_TITLE
  release_immutability: false
  security:
    vulnerability_alerts: true
    automated_security_fixes: false
    private_vulnerability_reporting: false
  actions:
    enabled: true
    allowed_actions: all
    sha_pinning_required: false
    workflow_permissions: write
    can_approve_pull_requests: true
    fork_pr_approval: first_time_contributors
  rulesets:
    - name: main
      target: branch
      enforcement: active
      conditions:
        ref_name:
          include:
            - ~DEFAULT_BRANCH
      rules:
        non_fast_forward: true
        deletion: true
        creation: false
        required_linear_history: false
        required_signatures: false
