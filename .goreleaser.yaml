version: 2
project_name: gh-kanban
before:
  hooks:
    - go mod tidy
builds:
  - id: gh-kanban
    main: ./cmd/kanban
    binary: gh-kanban
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildDate={{.Date}}
archives:
  - id: gh-kanban
    name_template: "gh-kanban_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - binary
checksum:
  name_template: "checksums.txt"
release:
  prerelease: auto
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
